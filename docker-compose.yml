version: '3.8'

services:
  producer:
    build: ./producer
    container_name: clickstream_producer
    env_file: .env
    volumes:
      - ./data/raw_events:/app/data/raw_events
    restart: on-failure

  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"   # S3 API port
      - "9001:9001"   # Web console port
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    build:
      context: ./storage
      dockerfile: Dockerfile.init
    container_name: minio_init
    env_file: .env
    depends_on:
      minio:
        condition: service_healthy

  bronze:
    build:
      context: .
      dockerfile: spark_jobs/Dockerfile
    container_name: bronze_layer
    env_file: .env
    restart: on-failure
    volumes:
      - ./data/raw_events:/app/spark_jobs/data/raw_events
    command: spark-submit --packages io.delta:delta-spark_2.12:3.2.1,org.apache.hadoop:hadoop-aws:3.3.4,com.amazonaws:aws-java-sdk-bundle:1.12.262 bronze_layer.py
    depends_on:
      minio-init:
        condition: service_completed_successfully
      producer:
        condition: service_started

  silver:
    build:
      context: .
      dockerfile: spark_jobs/Dockerfile
    container_name: silver_layer
    env_file: .env
    restart: on-failure
    command: spark-submit --packages io.delta:delta-spark_2.12:3.2.1,org.apache.hadoop:hadoop-aws:3.3.4,com.amazonaws:aws-java-sdk-bundle:1.12.262 silver_layer.py
    depends_on:
      minio-init:
        condition: service_completed_successfully

  gold:
    build:
      context: .
      dockerfile: spark_jobs/Dockerfile
    container_name: gold_layer
    env_file: .env
    restart: on-failure
    command: spark-submit --packages io.delta:delta-spark_2.12:3.2.1,org.apache.hadoop:hadoop-aws:3.3.4,com.amazonaws:aws-java-sdk-bundle:1.12.262 gold_layer.py
    depends_on:
      minio-init:
        condition: service_completed_successfully

  api:
    build: ./api
    container_name: clickstream_api
    ports:
      - "${API_PORT}:8000"
    env_file: .env
    depends_on:
      - minio

  airflow:
    build: ./orchestration
    container_name: clickstream_airflow
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    env_file: .env
    volumes:
      - ./orchestration/dags:/opt/airflow/dags
      - ./storage:/opt/airflow/storage
    ports:
      - "8080:8080"
    command: standalone
    depends_on:
      - minio

volumes:
  minio_data:
